apiVersion: apps/v1
kind: Deployment
metadata:
  name: urllib-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: urllib-test
  template:
    metadata:
      labels:
        app: urllib-test
    spec:
      containers:
        - name: app
          image: nginx:latest
          securityContext:
            privileged: true
          ports:
            - containerPort: 80
